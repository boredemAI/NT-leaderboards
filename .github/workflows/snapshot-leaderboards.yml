name: Snapshot team leaderboards

# Fetches the latest stats for every tag in data/teams.json directly from
# https://www.nitrotype.com/api/v2/teams/<TAG> and writes:
#   - data/snapshots/latest.json            (served by the site)
#   - data/snapshots/<yesterday-utc>.json   (dated archive)
#
# Runs once/day at 00:15 UTC (15 minutes after day rollover so NT has a chance
# to update its rolling 24h stats).

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snapshot-leaderboards
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate snapshot
        run: node scripts/snapshot-leaderboards.mjs

      - name: Commit snapshot
        run: |
          if [ -z "$(git status --porcelain data/snapshots)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots
          git commit -m "chore(data): leaderboard snapshot $(date -u +%Y-%m-%d)"
          git push
