name: Snapshot team leaderboards

# Fetches the latest stats for every tag in data/teams.json directly from
# https://www.nitrotype.com/api/v2/teams/<TAG> and writes:
#   - data/snapshots/latest.json            (served by the site)
#   - data/snapshots/<yesterday-utc>.json   (dated archive, written once/day)
#
# Runs hourly at :37 UTC. Full crawl is ~15 min at 4.6s pacing (matches
# Starlight's "clean" 13 teams/min rate on a stable IP). The job has
# a 45 min ceiling so that if NT's Cloudflare starts 429'ing our runner IP
# hard, the run can still exhaust its internal per-tag budget and commit a
# partial snapshot (any teams that kept 429ing land in `failures` in
# latest.json and retry the next hour from a different runner IP).
#
# Why :37 and not :00? GitHub's own docs warn that scheduled workflows can be
# delayed or silently dropped during high-load periods, and every :00 of the
# hour is the worst moment on the platform because that's when every cron in
# the world fires at once. An off-peak minute (37 is prime, avoids :00/:15/:30/:45)
# significantly improves the odds our run actually gets dispatched on time.

on:
  schedule:
    - cron: '37 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snapshot-leaderboards
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate snapshot
        run: node scripts/snapshot-leaderboards.mjs

      - name: Commit snapshot
        # Rebase-then-push-with-retry. A full crawl takes ~15 min and `main`
        # can move while we're running (other workflow runs, user-submitted
        # team adds via /api/request-team, manual PRs). Plain `git push`
        # silently drops the run's work on non-fast-forward. Rebase our
        # snapshot commit onto fresh origin/main before pushing, and retry
        # a couple times if we race with yet another push between rebase
        # and our own push.
        run: |
          if [ -z "$(git status --porcelain data/snapshots)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots
          git commit -m "chore(data): leaderboard snapshot $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git fetch origin "${GITHUB_REF_NAME:-main}"
            git rebase "origin/${GITHUB_REF_NAME:-main}" || { git rebase --abort; exit 1; }
            if git push origin "HEAD:${GITHUB_REF_NAME:-main}"; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push attempt $i rejected (likely another commit landed); retrying..."
            sleep $((i * 2))
          done
          echo "::error::Failed to push snapshot after 5 attempts."
          exit 1
