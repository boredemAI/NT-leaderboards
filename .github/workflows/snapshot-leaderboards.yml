name: Snapshot team leaderboards

# Fetches the latest stats for every tag in data/teams.json directly from
# https://www.nitrotype.com/api/v2/teams/<TAG> and writes:
#   - data/snapshots/latest.json            (served by the site)
#   - data/snapshots/<yesterday-utc>.json   (dated archive, written once/day)
#
# Runs hourly (at :00 UTC). Full crawl is ~15 min at 4.6s pacing (matches
# Starlight's "clean" 13 teams/min rate on a stable IP). The job has
# a 45 min ceiling so that if NT's Cloudflare starts 429'ing our runner IP
# hard, the run can still exhaust its internal per-tag budget and commit a
# partial snapshot (any teams that kept 429ing land in `failures` in
# latest.json and retry the next hour from a different runner IP).

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snapshot-leaderboards
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate snapshot
        run: node scripts/snapshot-leaderboards.mjs

      - name: Commit snapshot
        run: |
          if [ -z "$(git status --porcelain data/snapshots)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots
          git commit -m "chore(data): leaderboard snapshot $(date -u +%Y-%m-%d)"
          git push
